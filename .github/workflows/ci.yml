name: CI & Documentation Update

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update Contributors List
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image_size: 100
          columns_per_row: 6
          use_username: false
          commit_message: "docs: update list of contributors"

      - name: Update Last Updated Time (UTC+7)
        run: |
          CURRENT_TIME_UTC7=$(date -u -d '+7 hours' +'%Y-%m-%d %H:%M')
          sed -i "s/Dự án được cập nhật lần cuối vào: \*\*[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\( [0-9]\{2\}:[0-9]\{2\}\)\{0,1\}\( (UTC\+7)\)\{0,1\}\*\*/Dự án được cập nhật lần cuối vào: **$CURRENT_TIME_UTC7 (UTC+7)**/" README.md

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          if ! git diff --quiet HEAD -- README.md; then
            git commit -m "docs: cập nhật thời gian cuối"
            git push
          fi
