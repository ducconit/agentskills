name: CI & Documentation Update

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update Contributors List
        uses: akhilmhdh/contributors-readme-action@v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image_size: 64
          # We will handle the commit and push manually to be sure
          auto_commit: false

      - name: Update Last Updated Date
        run: |
          CURRENT_DATE=$(date +'%Y-%m-%d')
          sed -i "s/Dự án được cập nhật lần cuối vào: \*\*[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\*\*/Dự án được cập nhật lần cuối vào: **$CURRENT_DATE**/" README.md

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: cập nhật danh sách đóng góp và thời gian cuối"
          git push
